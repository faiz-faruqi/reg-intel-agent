services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: reg-intel-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reg_intel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reg-intel-api
    env_file:
      - .env
    environment:
      # These override any matching keys from .env
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/reg_intel
      MODEL_PROVIDER: openrouter
      PORT: 8000
      DEBUG: "false"
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
